<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PopSoda · Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#07090d;--ink-2:#0c1016;--line:#1e2734;
  --paper:#e8e3d8;--paper-dim:#9aa3ad;--paper-faint:#5d6671;
  --amber:#ffb454;--teal:#3ddbc9;--teal-deep:#1a9e90;
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--amber);color:var(--ink)}
body{
  background:var(--ink);color:var(--paper);
  font-family:'Noto Sans SC',sans-serif;font-weight:300;line-height:1.8;
  min-height:100vh;display:flex;flex-direction:column;
  padding:12vh 8vw 8vh;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.35em;color:var(--teal);margin-bottom:24px;display:flex;align-items:center;gap:14px}
.kicker::before{content:"";width:42px;height:1px;background:var(--teal-deep)}
h1{font-family:'ZCOOL QingKe HuangYou',sans-serif;font-weight:400;font-size:clamp(44px,8vw,92px);letter-spacing:.03em;line-height:1.1}
h1 span{color:var(--amber)}
.sub{color:var(--paper-dim);max-width:520px;margin-top:18px;font-size:15px}
.posts{margin-top:72px;border-top:1px solid var(--line);max-width:860px}
.post{
  display:flex;align-items:baseline;gap:26px;padding:30px 6px;
  border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
  transition:background .25s,padding-left .25s;
}
.post:hover{background:var(--ink-2);padding-left:18px}
.post .date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--paper-faint);white-space:nowrap}
.post .t{font-family:'ZCOOL QingKe HuangYou',sans-serif;font-size:24px;letter-spacing:.03em}
.post:hover .t{color:var(--amber)}
.post .d{font-size:13px;color:var(--paper-dim);margin-left:auto;text-align:right;max-width:300px}
.post .arrow{color:var(--teal);font-family:'IBM Plex Mono',monospace}
footer{margin-top:auto;padding-top:80px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--paper-faint)}
@media(max-width:680px){.post{flex-wrap:wrap;gap:8px 18px}.post .d{margin-left:0;text-align:left;max-width:none}}
</style>
</head>
<body>
  <div class="kicker">POPSODA · NOTES</div>
  <h1>Stories Worth <span>Telling</span></h1>
  <p class="sub">Notes on ML systems, inference optimization, and engineering.</p>
  <div class="posts">
    <a class="post" href="./tts-optimization.html">
      <span class="date">2026-06</span>
      <span class="t">The Microsecond War: Optimizing Higgs Audio v3 TTS</span>
      <span class="d">Four-stage pipeline · CUDA graphs · windowed streaming vocoder · measured on one H100</span>
      <span class="arrow">→</span>
    </a>
  </div>
  <footer>POPSODA2002.GITHUB.IO</footer>
</body>
</html>
